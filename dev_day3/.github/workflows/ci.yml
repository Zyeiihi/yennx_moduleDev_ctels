name: EASM Tool Continuous Integration

on:
  push:
    branches: [ main, homework ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout mã nguồn từ GitHub
      uses: actions/checkout@v4

    - name: Thiết lập môi trường Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Setting libary
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Kiểm tra lỗi cú pháp và Linting (Flake8)
      run: |
        # Dừng tiến trình build nếu có lỗi cú pháp Python
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Cảnh báo các lỗi style guide thông thường
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Thực thi các bài kiểm thử tự động (Unit Test)
      run: |
        python -m unittest test_scanners.py