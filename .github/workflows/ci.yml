# .github/workflows/ci.yml
# Bài 5: CI/CD với GitHub Actions
# Jobs: lint → test → security-scan → docker-build
name: Mini ASM CI/CD Pipeline

on:
  push:
    branches: [ main, homework, homework-final ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────
  # 1. Lint (Flake8)
  # ─────────────────────────────────────────
  lint:
    name: Lint (Flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dev_day3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install flake8
        run: pip install flake8

      - name: Run Flake8 (syntax errors only, hard fail)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Flake8 (style warnings, soft fail)
        run: flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  # ─────────────────────────────────────────
  # 2. Unit Tests + Coverage
  # ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: dev_day3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest test/ -v \
            --cov=internal \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -x
        env:
          DB_DRIVER: sqlite
          SQLITE_PATH: /tmp/test_mini_asm.db

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ─────────────────────────────────────────
  # 3. Secret Detection (Gitleaks)
  # ─────────────────────────────────────────
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: dev_day3
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Gitleaks

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # Report but don't block

  # ─────────────────────────────────────────
  # 4. Dependency Vulnerability Scan (Trivy)
  # ─────────────────────────────────────────
  trivy-scan:
    name: Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: dev_day3
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: dev_day3
          format: table
          exit-code: 0     # Don't block builds, just report
          severity: CRITICAL,HIGH
        continue-on-error: true

  # ─────────────────────────────────────────
  # 5. Docker Build + Scan
  # ─────────────────────────────────────────
  docker-build:
    name: Docker Build & Image Scan
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: dev_day3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: dev_day3        
          push: false
          tags: mini-asm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mini-asm:${{ github.sha }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
        continue-on-error: true
